name: CI – Test & Build

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    permissions:
      contents: read

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run TypeScript type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npx jest tests/unit --no-coverage --forceExit
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/pothersathi_test
          JWT_SECRET: test-jwt-secret-for-ci-32chars-long
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci-32chars-long
          JWT_EXPIRES_IN: 1h
          JWT_REFRESH_EXPIRES_IN: 7d
          DEMO_MODE: "true"
          DEMO_OTP: "123456"
          PLATFORM_FEE_PERCENT: "15"

      - name: Run API integration tests
        run: npx jest tests/api --no-coverage --forceExit --detectOpenHandles
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/pothersathi_test
          JWT_SECRET: test-jwt-secret-for-ci-32chars-long
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci-32chars-long
          JWT_EXPIRES_IN: 1h
          JWT_REFRESH_EXPIRES_IN: 7d
          DEMO_MODE: "true"
          DEMO_OTP: "123456"
          PLATFORM_FEE_PERCENT: "15"

      - name: Run socket tests
        run: npx jest tests/sockets --no-coverage --forceExit --detectOpenHandles
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/pothersathi_test
          JWT_SECRET: test-jwt-secret-for-ci-32chars-long
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci-32chars-long
          JWT_EXPIRES_IN: 1h
          JWT_REFRESH_EXPIRES_IN: 7d
          DEMO_MODE: "true"
          DEMO_OTP: "123456"
          PLATFORM_FEE_PERCENT: "15"

      - name: Run full test suite with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/pothersathi_test_cov
          JWT_SECRET: test-jwt-secret-for-ci-32chars-long
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci-32chars-long
          JWT_EXPIRES_IN: 1h
          JWT_REFRESH_EXPIRES_IN: 7d
          DEMO_MODE: "true"
          DEMO_OTP: "123456"
          PLATFORM_FEE_PERCENT: "15"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 7

  build:
    name: TypeScript Build
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
